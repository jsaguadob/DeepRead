{% extends "base.html" %}

{% block title %}Unirse a Grupo - DeepRead{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-xl shadow-md p-8">
            <h1 class="text-2xl font-bold text-primary mb-6">Unirse a un Grupo</h1>
            <p class="text-gray-600 mb-6">Ingresa el código que te dio tu profesor</p>
            
            <form method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Código del grupo</label>
                    <input type="text" name="codigo" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary text-center text-2xl font-bold"
                        placeholder="ABCD12" style="text-transform: uppercase;">
                </div>
                
                <button type="submit" class="w-full bg-secondary hover:bg-blue-600 text-white py-3 rounded-lg font-medium">
                    Unirse al Grupo
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

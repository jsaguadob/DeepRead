{% extends "base.html" %}

{% block title %}Crear Grupo - DeepRead{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-xl shadow-md p-8">
            <h1 class="text-2xl font-bold text-primary mb-6">Crear Grupo de Lectura</h1>
            
            <form method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Nombre del grupo</label>
                    <input type="text" name="nombre" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary"
                        placeholder="Grupo de 3er Año">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Descripción (opcional)</label>
                    <textarea name="descripcion" rows="3"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary"
                        placeholder="Grupo de lectura para estudiantes de..."></textarea>
                </div>
                
                <button type="submit" class="w-full bg-accent hover:opacity-90 text-primary py-3 rounded-lg font-medium">
                    Crear Grupo
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

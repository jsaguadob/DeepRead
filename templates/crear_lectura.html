{% extends "base.html" %}

{% block title %}Crear Lectura - DeepRead{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-xl shadow-md p-8">
            <h1 class="text-2xl font-bold text-primary mb-2">Crear Lectura</h1>
            <p class="text-gray-600 mb-6">Grupo: {{ grupo.nombre }}</p>
            
            <form method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Título</label>
                    <input type="text" name="titulo" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Contenido</label>
                    <textarea name="contenido" rows="10" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary"
                        placeholder="Escribe el texto de lectura aqui..."></textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nivel</label>
                        <select name="nivel" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                            <option value="1">Básico</option>
                            <option value="2">Intermedio</option>
                            <option value="3">Avanzado</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tiempo (minutos)</label>
                        <input type="number" name="tiempo" value="10" min="1" max="60"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Puntos</label>
                        <input type="number" name="puntos" value="10" min="1" max="100"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Categoría</label>
                        <select name="categoria" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                            <option value="ciencia">Ciencia</option>
                            <option value="historia">Historia</option>
                            <option value="literatura">Literatura</option>
                            <option value="actualidad">Actualidad</option>
                            <option value="filosofia">Filosofía</option>
                            <option value="matematicas">Matemáticas</option>
                            <option value="geografia">Geografía</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Fecha de cierre (opcional)</label>
                        <input type="datetime-local" name="fecha_cierre"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                        <p class="text-xs text-gray-500 mt-1">Dejar vacío para sin límite</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Intentos máximos</label>
                        <input type="number" name="intentos" value="3" min="1" max="10"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-accent hover:opacity-90 text-primary py-3 rounded-lg font-medium">
                    Crear Lectura
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

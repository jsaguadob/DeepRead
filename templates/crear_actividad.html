{% extends "base.html" %}

{% block title %}Crear Sopa de Letras - DeepRead{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="mb-6">
        <a href="{{ url_for('main.ver_lectura', lectura_id=lectura.id) }}" class="text-secondary hover:text-blue-600">
            ← Volver a la Lectura
        </a>
    </div>

    <div class="bg-white rounded-xl shadow-lg p-8 max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold text-primary mb-2">Crear Sopa de Letras</h1>
        <p class="text-gray-600 mb-6">Lectura: {{ lectura.titulo }}</p>

        <form method="POST" action="{{ url_for('admin.crear_actividad', lectura_id=lectura.id) }}" class="space-y-4">
            <input type="hidden" name="tipo" value="sopa">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Título</label>
                <input type="text" name="titulo" required class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Ej: Palabras del texto">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Palabras a encontrar (separadas por coma)</label>
                <input type="text" name="palabras_sopa" required class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="SOL, LUNA, MAR">
                <p class="text-xs text-gray-500">Escribe las palabras que el estudiante debe encontrar en la sopa</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Puntos</label>
                <input type="number" name="puntos" value="5" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>

            <button type="submit" class="w-full bg-accent hover:opacity-90 text-primary py-3 rounded-lg font-bold">
                Crear Sopa de Letras
            </button>
        </form>
    </div>
</div>
{% endblock %}

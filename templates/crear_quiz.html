{% extends "base.html" %}

{% block title %}Crear Pregunta - DeepRead{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-xl shadow-md p-8">
            <h1 class="text-2xl font-bold text-primary mb-2">Agregar Pregunta de Quiz</h1>
            <p class="text-gray-600 mb-6">Lectura: {{ lectura.titulo }}</p>
            
            <form method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Pregunta</label>
                    <textarea name="pregunta" rows="2" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary"></textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Opción A</label>
                        <input type="text" name="opcion_a" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Opción B</label>
                        <input type="text" name="opcion_b" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Opción C</label>
                        <input type="text" name="opcion_c" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Opción D</label>
                        <input type="text" name="opcion_d" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Respuesta Correcta</label>
                    <select name="respuesta" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                        <option value="a">A</option>
                        <option value="b">B</option>
                        <option value="c">C</option>
                        <option value="d">D</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Explicación</label>
                    <textarea name="explicacion" rows="2"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg"
                        placeholder="Explica por qué es la respuesta correcta..."></textarea>
                </div>
                
                <button type="submit" class="w-full bg-secondary hover:bg-blue-600 text-white py-3 rounded-lg font-medium">
                    Agregar Pregunta
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

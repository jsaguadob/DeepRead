{% extends "base.html" %}

{% block title %}Registrarse - DeepRead{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <div class="text-center mb-8">
                <a href="{{ url_for('main.index') }}" class="text-3xl font-bold text-primary flex items-center justify-center gap-2">
                    <span class="text-accent">📚</span> DeepRead
                </a>
                <h2 class="text-2xl font-semibold text-gray-800 mt-4">Crea tu cuenta</h2>
                <p class="text-gray-600">Únete a DeepRead y mejora tu lectura crítica</p>
            </div>

            <form method="POST" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Nombre de usuario</label>
                    <input type="text" id="username" name="username" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent transition"
                        placeholder="nombredeusuario">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent transition"
                        placeholder="tu@email.com">
                    <p class="text-xs text-gray-500 mt-1">Usa email .edu para cuenta institucional</p>
                </div>

                <div>
                    <label for="tipo" class="block text-sm font-medium text-gray-700 mb-2">Tipo de cuenta</label>
                    <select id="tipo" name="tipo" onchange="toggleRol()" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent transition">
                        <option value="gratuito">Gratuito</option>
                        <option value="institucional">Institucional (.edu requerido)</option>
                    </select>
                </div>

                <div id="rol_div" style="display: none;">
                    <label for="rol" class="block text-sm font-medium text-gray-700 mb-2">Rol</label>
                    <select id="rol" name="rol" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent transition">
                        <option value="estudiante">Estudiante</option>
                        <option value="profesor">Profesor / Docente</option>
                    </select>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                    <input type="password" id="password" name="password" required minlength="6"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent transition"
                        placeholder="••••••••">
                </div>

                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-2">Confirmar contraseña</label>
                    <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent transition"
                        placeholder="••••••••">
                </div>

                <button type="submit" 
                    class="w-full bg-accent hover:opacity-90 text-primary py-3 rounded-lg font-medium transition shadow-md">
                    Crear Cuenta
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">¿Ya tienes cuenta?
                    <a href="{{ url_for('auth.login') }}" class="text-secondary hover:text-blue-600 font-medium">
                        Inicia sesión
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
function toggleRol() {
    var tipo = document.getElementById('tipo').value;
    var rolDiv = document.getElementById('rol_div');
    var rolSelect = document.getElementById('rol');
    
    if (tipo === 'institucional') {
        rolDiv.style.display = 'block';
    } else {
        rolDiv.style.display = 'none';
        rolSelect.value = 'estudiante';
    }
}
</script>
{% endblock %}

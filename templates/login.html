{% extends "base.html" %}

{% block title %}Iniciar Sesión - DeepRead{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <div class="text-center mb-8">
                <a href="{{ url_for('main.index') }}" class="text-3xl font-bold text-primary flex items-center justify-center gap-2">
                    <span class="text-accent">📚</span> DeepRead
                </a>
                <h2 class="text-2xl font-semibold text-gray-800 mt-4">Bienvenido de nuevo</h2>
                <p class="text-gray-600">Inicia sesión para continuar leyendo</p>
            </div>

            <form method="POST" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent transition"
                        placeholder="tu@email.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent transition"
                        placeholder="••••••••">
                </div>

                <button type="submit" 
                    class="w-full bg-secondary hover:bg-blue-600 text-white py-3 rounded-lg font-medium transition shadow-md">
                    Iniciar Sesión
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">¿No tienes cuenta?
                    <a href="{{ url_for('auth.register') }}" class="text-secondary hover:text-blue-600 font-medium">
                        Regístrate gratis
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}Editar Lectura - DeepRead{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-xl shadow-md p-8">
            <h1 class="text-2xl font-bold text-primary mb-2">Editar Lectura</h1>
            <p class="text-gray-600 mb-6">Grupo: {{ grupo.nombre }}</p>
            
            <form method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Título</label>
                    <input type="text" name="titulo" value="{{ lectura.titulo }}" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Contenido</label>
                    <textarea name="contenido" rows="10" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary">{{ lectura.contenido }}</textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nivel</label>
                        <select name="nivel" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                            <option value="1" {% if lectura.nivel == 1 %}selected{% endif %}>Básico</option>
                            <option value="2" {% if lectura.nivel == 2 %}selected{% endif %}>Intermedio</option>
                            <option value="3" {% if lectura.nivel == 3 %}selected{% endif %}>Avanzado</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tiempo (minutos)</label>
                        <input type="number" name="tiempo" value="{{ lectura.tiempo_estimado_minutos }}" min="1" max="60"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Puntos</label>
                        <input type="number" name="puntos" value="{{ lectura.puntos_recompensa }}" min="1" max="100"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Categoría</label>
                        <select name="categoria" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                            <option value="ciencia" {% if lectura.categoria == 'ciencia' %}selected{% endif %}>Ciencia</option>
                            <option value="historia" {% if lectura.categoria == 'historia' %}selected{% endif %}>Historia</option>
                            <option value="literatura" {% if lectura.categoria == 'literatura' %}selected{% endif %}>Literatura</option>
                            <option value="actualidad" {% if lectura.categoria == 'actualidad' %}selected{% endif %}>Actualidad</option>
                            <option value="filosofia" {% if lectura.categoria == 'filosofia' %}selected{% endif %}>Filosofía</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-accent hover:opacity-90 text-primary py-3 rounded-lg font-medium">
                    Guardar Cambios
                </button>
            </form>
            
            <form method="POST" action="{{ url_for('admin.eliminar_lectura_grupo', grupo_id=grupo.id, lectura_id=lectura.id) }}" class="mt-4">
                <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white py-3 rounded-lg font-medium" onclick="return confirm('¿Estás seguro de eliminar esta lectura?')">
                    Eliminar Lectura
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}Crear Lectura Pública - DeepRead{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="mb-6">
        <a href="{{ url_for('main.dashboard') }}" class="text-secondary hover:text-blue-600">← Volver al Dashboard</a>
    </div>

    <div class="bg-white rounded-xl shadow-lg p-8 max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold text-primary mb-6">Crear Lectura Pública</h1>
        <p class="text-gray-600 mb-6">Esta lectura será visible para todos los usuarios gratuitos.</p>

        <form method="POST" class="space-y-6">
            <div>
                <label for="titulo" class="block text-sm font-medium text-gray-700 mb-2">Título</label>
                <input type="text" id="titulo" name="titulo" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent"
                    placeholder="Título de la lectura">
            </div>

            <div>
                <label for="contenido" class="block text-sm font-medium text-gray-700 mb-2">Contenido</label>
                <textarea id="contenido" name="contenido" required rows="12"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent"
                    placeholder="Escribe el texto de la lectura aquí..."></textarea>
            </div>

            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label for="nivel" class="block text-sm font-medium text-gray-700 mb-2">Nivel</label>
                    <select id="nivel" name="nivel" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent">
                        <option value="1">Nivel 1 - Básico</option>
                        <option value="2">Nivel 2 - Intermedio</option>
                        <option value="3">Nivel 3 - Avanzado</option>
                    </select>
                </div>

                <div>
                    <label for="categoria" class="block text-sm font-medium text-gray-700 mb-2">Categoría</label>
                    <select id="categoria" name="categoria" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent">
                        <option value="ciencia">Ciencia</option>
                        <option value="historia">Historia</option>
                        <option value="literatura">Literatura</option>
                        <option value="tecnologia">Tecnología</option>
                        <option value="actualidad">Actualidad</option>
                        <option value="opinion">Opinión</option>
                    </select>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label for="tiempo" class="block text-sm font-medium text-gray-700 mb-2">Tiempo estimado (minutos)</label>
                    <input type="number" id="tiempo" name="tiempo" value="10" min="1" max="120" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent">
                </div>

                <div>
                    <label for="puntos" class="block text-sm font-medium text-gray-700 mb-2">Puntos de recompensa</label>
                    <input type="number" id="puntos" name="puntos" value="10" min="1" max="100" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent">
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label for="intentos" class="block text-sm font-medium text-gray-700 mb-2">Intentos máximos para el quiz</label>
                    <input type="number" id="intentos" name="intentos" value="3" min="1" max="10" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent">
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-accent hover:opacity-90 text-primary py-3 rounded-lg font-medium transition shadow-md">
                Crear Lectura Pública
            </button>
        </form>
    </div>
</div>
{% endblock %}
